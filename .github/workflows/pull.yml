name: pull-dukascopy
on:
  push:
    paths:
      - 'job.json'
  workflow_dispatch: {}
  schedule:
    - cron: '0 */3 * * *'   # every 3 hours: gradual, throttle-safe backfill
permissions:
  contents: write
concurrency:
  group: pull
  cancel-in-progress: false
jobs:
  pull:
    runs-on: ubuntu-latest
    timeout-minutes: 340
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dukascopy-node
        run: |
          for i in 1 2 3; do
            npm i dukascopy-node@latest && exit 0
            echo "npm install failed (attempt $i), retrying..."; sleep $((i*10))
          done
          echo "::error::npm install failed after 3 attempts"; exit 1
      - name: Pull data
        run: node pull.js
      - name: Commit data
        if: always()
        run: |
          git config user.name "qootsi-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data manifest.json
          if git diff --cached --quiet; then
            echo "no changes"
          else
            git commit -m "data: backfill $(date -u +%FT%TZ) [skip ci]"
            pushed=0
            for i in 1 2 3 4 5; do
              if git push; then pushed=1; break; fi
              echo "push rejected (attempt $i), rebasing on remote main..."
              git pull --rebase --autostash origin main || true
              sleep $((RANDOM % 5 + 3))
            done
            if [ "$pushed" != "1" ]; then echo "::error::git push failed after 5 attempts"; exit 1; fi
          fi
